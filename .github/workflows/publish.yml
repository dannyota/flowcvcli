name: Publish to PyPI

# Publishes flowcvcli to PyPI via PyPI Trusted Publishing (OIDC) — no API token
# is stored as a secret. Runs when a GitHub Release is published, and can also be
# triggered manually (workflow_dispatch) to publish the current main.
#
# ONE-TIME SETUP (PyPI side), do this once before the first run:
#   https://pypi.org/manage/project/flowcvcli/settings/publishing/  -> Add a
#   "pending"/trusted publisher with EXACTLY:
#     Owner:                dannyota
#     Repository name:      flowcvcli
#     Workflow name:        publish.yml
#     Environment name:     pypi
#   (The environment name must match the `environment:` below.)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run unit tests
        run: python -m unittest discover -s tests -t . -v

  publish:
    name: Build and publish
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/flowcvcli/
    permissions:
      id-token: write          # required to mint the OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
