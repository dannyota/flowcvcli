name: Tests

# Offline unit tests (stdlib unittest, no network, no credentials).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-22.04, python: "3.8" }    # oldest supported
          - { os: ubuntu-latest, python: "3.13" }  # newest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -t . -v
